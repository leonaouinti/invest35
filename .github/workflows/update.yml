name: Update DVF Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am
  workflow_dispatch:       # Manual trigger button too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Download DVF data
        run: |
          curl -L "https://files.data.gouv.fr/geo-dvf/latest/csv/35.csv.gz" -o dvf.csv.gz
          gunzip dvf.csv.gz

      - name: Run scraper
        run: python3 scraper.py

      - name: Run injector
        run: python3 inject.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html properties.json
          git diff --staged --quiet || git commit -m "auto: update DVF data $(date +'%Y-%m-%d')"
          git push
